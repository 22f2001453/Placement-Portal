{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 font-weight-bold">Login to Portal</h3>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="role" class="form-label">I am a:</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="student">Select</option>
                            <option value="student">Student</option>
                            <option value="company">Company</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="identifier" class="form-label">Username / Email / Company Name</label>
                        <input type="text" class="form-control" id="identifier" name="identifier" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Need an account?</p>
                    <a href="{{ url_for('register_student') }}" class="text-decoration-none me-3">Register as Student</a>
                    <a href="{{ url_for('register_company') }}" class="text-decoration-none">Register as Company</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
