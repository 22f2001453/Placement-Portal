{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5">
                <h3 class="mb-4">Update Student Profile</h3>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" value="{{ student.email }}" disabled>
                        <div class="form-text">Email cannot be changed.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ student.phone }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="resume" class="form-label">Upload Resume (PDF only)</label>
                        <input class="form-control" type="file" id="resume" name="resume" accept=".pdf">
                        {% if student.resume %}
                        <div class="form-text mt-2 text-success">
                            Currently uploaded: <a href="{{ url_for('static', filename='uploads/' ~ student.resume|replace('uploads/', '')) }}" target="_blank">View Resume</a>
                        </div>
                        {% endif %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
