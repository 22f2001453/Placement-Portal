{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Company Registration</h3>
                <form method="POST" action="{{ url_for('register_company') }}">
                    <div class="mb-3">
                        <label for="company_name" class="form-label">Company Name</label>
                        <input type="text" class="form-control" id="company_name" name="company_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="hr_contact" class="form-label">HR Contact Name</label>
                        <input type="text" class="form-control" id="hr_contact" name="hr_contact" required>
                    </div>
                    <div class="mb-3">
                        <label for="website" class="form-label">Company Website (Optional)</label>
                        <input type="url" class="form-control" id="website" name="website">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Register and Request Approval</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
