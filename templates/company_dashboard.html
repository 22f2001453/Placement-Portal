{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h4 class="card-title">{{ company.company_name }}</h4>
                <p class="text-muted mb-1">HR Contact: {{ company.hr_contact }}</p>
                {% if company.website %}
                <p class="mb-3"><a href="{{ company.website }}" target="_blank">Website</a></p>
                {% endif %}
                <hr>
                <div class="d-flex justify-content-between align-items-center">
                    <span>Total Drives Posted:</span>
                    <span class="badge bg-primary rounded-pill">{{ drives_count }}</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <h3 class="mb-4">Quick Actions</h3>
        <div class="row">
            <div class="col-md-6 mb-3">
                <a href="{{ url_for('create_drive') }}" class="text-decoration-none">
                    <div class="card bg-success text-white text-center h-100 shadow-sm border-0 action-card">
                        <div class="card-body d-flex flex-column justify-content-center py-4">
                            <h5 class="card-title mb-0">Post New Drive</h5>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-6 mb-3">
                <a href="{{ url_for('company_drives') }}" class="text-decoration-none">
                    <div class="card bg-info text-white text-center h-100 shadow-sm border-0 action-card">
                        <div class="card-body d-flex flex-column justify-content-center py-4">
                            <h5 class="card-title mb-0">View Drives & Applications</h5>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
<style>
    .action-card { transition: transform 0.2s; }
    .action-card:hover { transform: translateY(-5px); }
</style>
{% endblock %}
